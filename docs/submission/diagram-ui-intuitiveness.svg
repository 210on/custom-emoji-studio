<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="36" fill="#F8FAFC"/>
  <rect x="32" y="32" width="1136" height="656" rx="28" fill="white"/>
  <text x="72" y="110" fill="#0F172A" font-family="Inter, Noto Sans JP, sans-serif" font-size="40" font-weight="800">UI直感性</text>
  <text x="72" y="152" fill="#64748B" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">操作の流れを「見る → 判断する → 調整する」に分解し、迷いを減らす情報設計</text>

  <rect x="84" y="224" width="300" height="232" rx="28" fill="#EEF2FF"/>
  <circle cx="144" cy="286" r="30" fill="#4F46E5"/>
  <text x="133" y="296" fill="white" font-family="Inter, Noto Sans JP, sans-serif" font-size="28" font-weight="800">1</text>
  <text x="196" y="280" fill="#0F172A" font-family="Inter, Noto Sans JP, sans-serif" font-size="30" font-weight="800">見る</text>
  <text x="196" y="324" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">ライト/ダーク両方の</text>
  <text x="196" y="356" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">プレビューを先に提示</text>

  <rect x="450" y="224" width="300" height="232" rx="28" fill="#FFF7ED"/>
  <circle cx="510" cy="286" r="30" fill="#EA580C"/>
  <text x="499" y="296" fill="white" font-family="Inter, Noto Sans JP, sans-serif" font-size="28" font-weight="800">2</text>
  <text x="562" y="280" fill="#0F172A" font-family="Inter, Noto Sans JP, sans-serif" font-size="30" font-weight="800">判断する</text>
  <text x="562" y="324" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">診断スコアを同じ画面で</text>
  <text x="562" y="356" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">即時に確認</text>

  <rect x="816" y="224" width="300" height="232" rx="28" fill="#ECFDF5"/>
  <circle cx="876" cy="286" r="30" fill="#10B981"/>
  <text x="865" y="296" fill="white" font-family="Inter, Noto Sans JP, sans-serif" font-size="28" font-weight="800">3</text>
  <text x="928" y="280" fill="#0F172A" font-family="Inter, Noto Sans JP, sans-serif" font-size="30" font-weight="800">調整する</text>
  <text x="928" y="324" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">下部タブと右カラムで</text>
  <text x="928" y="356" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">編集対象を明確化</text>

  <path d="M384 340H448" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round"/>
  <path d="M750 340H814" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round"/>

  <rect x="84" y="510" width="1032" height="122" rx="26" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="120" y="560" fill="#0F172A" font-family="Inter, Noto Sans JP, sans-serif" font-size="26" font-weight="800">研究上の意味</text>
  <text x="120" y="602" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">視認性評価を使うシステムでは、評価値だけでなく、その値に到達するまでの操作負荷を下げることが重要である。</text>
</svg>

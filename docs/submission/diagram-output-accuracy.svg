  <text x="104" y="352" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">同一の設定オブジェクトを</text>
  <text x="104" y="386" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">プレビューと書き出しで共有</text>

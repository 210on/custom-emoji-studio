  <text x="1011" y="435" fill="#475569" font-family="Inter, Noto Sans JP, sans-serif" font-size="18" font-weight="800">PNG書き出し</text>
  <rect x="1018" y="458" width="80" height="52" rx="14" fill="white"/>
  <text x="1040" y="490" fill="#111827" font-family="Noto Sans JP, sans-serif" font-size="26" font-weight="900">あり</text>


  <path d="M993 336L1035 374L993 412" stroke="#EA580C" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="988" y="210" width="140" height="150" rx="28" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="1018" y="255" fill="#475569" font-family="Inter, Noto Sans JP, sans-serif" font-size="18" font-weight="800">プレビュー</text>
  <rect x="1018" y="278" width="80" height="52" rx="14" fill="white"/>
  <text x="1040" y="310" fill="#111827" font-family="Noto Sans JP, sans-serif" font-size="26" font-weight="900">あり</text>


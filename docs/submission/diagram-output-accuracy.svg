  <text x="628" y="320" fill="#0F172A" font-family="Inter, Noto Sans JP, sans-serif" font-size="26" font-weight="800">renderEmojiToCanvas()</text>
  <text x="628" y="362" fill="#334155" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">フォント待機</text>

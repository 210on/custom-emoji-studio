  <path d="M537 336L579 374L537 412" stroke="#4F46E5" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="596" y="210" width="250" height="330" rx="28" fill="#FFF7ED"/>

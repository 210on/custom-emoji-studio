<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" rx="36" fill="#F8FAFC"/>
  <rect x="32" y="32" width="1136" height="656" rx="28" fill="white"/>
  <text x="72" y="110" fill="#0F172A" font-family="Inter, Noto Sans JP, sans-serif" font-size="40" font-weight="800">出力精度</text>
  <text x="72" y="152" fill="#64748B" font-family="Inter, Noto Sans JP, sans-serif" font-size="22" font-weight="500">プレビューとPNG書き出しを同じ描画ロジックで処理し、視覚差を減らす設計</text>

  <rect x="72" y="210" width="310" height="330" rx="28" fill="#EEF2FF"/>
